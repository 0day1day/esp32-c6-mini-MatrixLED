name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: py_compile all modules
        run: |
          set -e
          for f in led_matrix_project/*.py led_matrix_project/fonts/*.py; do
            echo "checking $f"
            python -m py_compile "$f"
          done
      - name: ruff lint
        run: |
          pip install ruff
          ruff check led_matrix_project/ || true

  firmware:
    name: Build ESP32-C6 firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only build firmware on version tags (and manual dispatch)
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Generate embedded assets
        run: |
          python3 - <<'PY'
          # Bake static/style.css into a frozen module so the firmware is self-contained.
          with open('led_matrix_project/static/style.css') as f:
              css = f.read()
          with open('led_matrix_project/embedded_assets.py', 'w') as f:
              f.write('# Auto-generated by CI. Do not edit.\n')
              f.write('CSS = ' + repr(css) + '\n')
          print('embedded_assets.py written (%d bytes of CSS)' % len(css))
          PY

      - name: Build firmware (frozen + C sniffer module)
        run: |
          docker run --rm -v "$PWD":/work -w /work espressif/idf:release-v5.4 bash -c '
            set -e
            git clone --depth 1 --branch v1.27.0 https://github.com/micropython/micropython /mp
            cd /mp
            git submodule update --init lib/micropython-lib
            make -C mpy-cross -j"$(nproc)"
            cd ports/esp32
            make BOARD=ESP32_GENERIC_C6 submodules
            make BOARD=ESP32_GENERIC_C6 \
                 FROZEN_MANIFEST=/work/manifest.py \
                 USER_C_MODULES=/work/usermodules/micropython.cmake \
                 -j"$(nproc)"
            cp -v build-ESP32_GENERIC_C6/firmware.bin /work/firmware.bin
          '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware.bin
          path: firmware.bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware.bin
          generate_release_notes: true
